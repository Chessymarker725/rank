<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miku Nakano Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  background: url('miku.jpg') no-repeat center center/cover;
  color: white;
}

/* overlay */
.overlay {
  background: rgba(0,0,0,0.65);
  height: 100%;
  width: 100%;
  padding: 20px;
}

/* header */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

header h1 {
  color: cyan;
  text-shadow: 0 0 20px cyan;
}

/* sidebar */
.sidebar {
  position: fixed;
  left: 0;
  top: 0;
  width: 220px;
  height: 100%;
  background: rgba(0,0,0,0.8);
  padding-top: 80px;
}

.sidebar a {
  display: block;
  padding: 15px;
  color: white;
  text-decoration: none;
  transition: 0.3s;
}

.sidebar a:hover {
  background: cyan;
  color: black;
}

/* main */
.main {
  margin-left: 240px;
  padding: 20px;
}

/* grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
}

/* card */
.card {
  background: rgba(255,255,255,0.1);
  border-radius: 15px;
  padding: 20px;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 20px rgba(0,255,255,0.3);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 30px cyan;
}

.card h2 {
  color: cyan;
  margin-bottom: 10px;
}

/* gallery image */
.miku-img {
  width: 100%;
  border-radius: 10px;
  margin-top: 10px;
  box-shadow: 0 0 15px cyan;
}

/* anime text */
.jp {
  font-size: 14px;
  color: #aaa;
  font-style: italic;
}

/* footer */
footer {
  text-align: center;
  margin-top: 20px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="overlay">

<header>
  <h1>💙 Miku Nakano System</h1>
</header>

<!-- SIDEBAR -->
<div class="sidebar">
  <a href="#">🏠 Home</a>
  <a href="#">💌 Profile</a>
  <a href="#">📊 Stats</a>
  <a href="#">🎧 Music</a>
  <a href="#">⚙️ Settings</a>
</div>

<!-- MAIN -->
<div class="main">

  <div class="grid">

    <div class="card">
      <h2>Miku Nakano</h2>
      <p>Best girl 💙</p>
      <p class="jp">三玖は最高です</p>
    </div>

    <div class="card">
      <h2>About</h2>
      <p>Website pribadi Fahmi.</p>
      <p class="jp">あなたが好きです</p>
    </div>

    <div class="card">
      <h2>Status</h2>
      <p>Love: ♾️</p>
      <p>Mode: Anime Lover</p>
    </div>

    <div class="card">
      <h2>Quotes</h2>
      <p>"Kalau itu untukmu... aku akan berusaha."</p>
    </div>

    <div class="card">
      <h2>Music</h2>
      <audio controls>
        <source src="music.mp3" type="audio/mpeg">
      </audio>
    </div>

    <!-- GALLERY MIKU -->
    <div class="card">
      <h2>Miku Gallery</h2>
      <img src="miku2.webp" class="miku-img">
      <img src="miku3.jpg" class="miku-img">
    </div>

  </div>

  <footer>
    © 2026 Pahmi Syg Dila-chan 💙
  </footer>

</div>

</div>

</body>
</html>
