<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Vyrion Music</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
  height:100vh;
  display:flex;
  background:#0b0b0f;
  color:white;
  overflow:hidden;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  background:#000;
  padding:20px;
}

.logo{
  font-size:22px;
  color:cyan;
  margin-bottom:20px;
}

.menu div{
  padding:10px;
  cursor:pointer;
  opacity:0.7;
}
.menu div:hover{opacity:1}

/* MAIN */
.main{
  flex:1;
  padding:20px;
  overflow:auto;
}

/* HEADER */
.header{
  font-size:24px;
  margin-bottom:20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:15px;
}

.card{
  background:#111;
  padding:10px;
  border-radius:15px;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
  background:#1a1a1a;
}

.card img{
  width:100%;
  border-radius:10px;
}

/* PLAYER BAR */
.player{
  position:fixed;
  bottom:0;
  left:220px;
  right:0;
  height:80px;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 20px;
  border-top:1px solid #222;
}

.now{
  display:flex;
  align-items:center;
}

.now img{
  width:50px;
  border-radius:5px;
  margin-right:10px;
}

.controls button{
  margin:0 5px;
  padding:8px;
  border:none;
  border-radius:50%;
  background:#222;
  color:white;
  cursor:pointer;
}

.controls button:hover{
  background:cyan;
  color:black;
}

.progress{
  width:300px;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">🎧 Vyrion</div>
  <div class="menu">
    <div>Home</div>
    <div>Library</div>
    <div>Playlist</div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="header">Trending Music</div>

  <div class="grid" id="grid"></div>
</div>

<!-- PLAYER -->
<div class="player">
  <div class="now">
    <img id="cover" src="cover1.jpg">
    <div>
      <div id="title">Hotel Room</div>
    </div>
  </div>

  <div class="controls">
    <button onclick="prev()">⏮</button>
    <button onclick="playPause()">▶</button>
    <button onclick="next()">⏭</button>
  </div>

  <input type="range" id="progress" class="progress">
</div>

<audio id="audio"></audio>

<script>
const songs=[
{title:"Hotel Room",file:"music1.mp3",cover:"cover1.jpg"},
{title:"Music 2",file:"music2.mp3",cover:"cover2.jpg"},
{title:"Music 3",file:"music3.mp3",cover:"cover3.jpg"},
{title:"Music 4",file:"music4.mp3",cover:"cover4.jpg"},
{title:"Music 5",file:"music5.mp3",cover:"cover5.jpg"}
];

let index=0;
const audio=document.getElementById("audio");

function loadSong(i){
index=i;
audio.src=songs[i].file;
cover.src=songs[i].cover;
title.innerText=songs[i].title;
}

function playPause(){
audio.paused?audio.play():audio.pause();
}

function next(){
index=(index+1)%songs.length;
loadSong(index);
audio.play();
}

function prev(){
index=(index-1+songs.length)%songs.length;
loadSong(index);
audio.play();
}

/* GRID */
songs.forEach((s,i)=>{
let div=document.createElement("div");
div.className="card";
div.innerHTML=`
<img src="${s.cover}">
<div>${s.title}</div>
`;
div.onclick=()=>{loadSong(i);audio.play();}
document.getElementById("grid").appendChild(div);
});

/* PROGRESS */
audio.addEventListener("timeupdate",()=>{
progress.value=(audio.currentTime/audio.duration)*100||0;
});

progress.oninput=()=>{
audio.currentTime=(progress.value/100)*audio.duration;
};

loadSong(0);
</script>

</body>
</html>
