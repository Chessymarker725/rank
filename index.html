<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vyrionyx Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #1a0000, #000);
  color: white;
  text-align: center;
}

/* HEADER */
.header {
  padding: 40px 20px;
}

.title {
  font-size: 50px;
  font-weight: 600;
  background: linear-gradient(90deg,#ff3b3b,#ff66cc,#ffcc66);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  margin-top: 10px;
  color: #ccc;
}

.ip {
  margin-top: 10px;
  color: #ffcc66;
  font-weight: bold;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(230px,1fr));
  gap: 25px;
  padding: 40px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  padding: 25px;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 20px rgba(255,0,0,0.3);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px) scale(1.05);
  box-shadow: 0 0 40px rgba(255,0,0,0.7);
}

/* TEXT */
.rank {
  font-size: 24px;
  margin-bottom: 10px;
}

.price {
  color: #ffcc66;
  margin-bottom: 15px;
}

/* BUTTON */
button {
  padding: 12px 20px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(90deg,#ff3b3b,#ff66cc);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  opacity: 0.8;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #111;
  padding: 30px;
  border-radius: 15px;
  width: 300px;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">Vyrionyx Store</div>
  <div class="subtitle">Premium Minecraft Rank Shop</div>
  <div class="ip">IP: Play.vyrionyx.biz.id</div>
</div>

<div class="container" id="shop"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="rankName"></h3>
    <input type="text" id="username" placeholder="Masukkan username">
    <br><br>
    <button onclick="confirmBuy()">Lanjut ke WhatsApp</button>
  </div>
</div>

<script>
const ranks = [
  "Survivor","Explorer","Warrior","Knight",
  "Legend","Mythic","Glory","Imortal"
];

let selectedRank = "";
let selectedPrice = 0;

const shop = document.getElementById("shop");

ranks.forEach((rank, i) => {
  let price = (i+1)*10000;

  let card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <div class="rank">${rank}</div>
    <div class="price">Rp ${price.toLocaleString()}</div>
    <button onclick="openModal('${rank}', ${price})">Beli</button>
  `;

  shop.appendChild(card);
});

function openModal(rank, price) {
  selectedRank = rank;
  selectedPrice = price;
  document.getElementById("modal").style.display = "flex";
  document.getElementById("rankName").innerText = rank;
}

function confirmBuy() {
  let user = document.getElementById("username").value;
  if (!user) return alert("Masukkan username dulu!");

  let msg = `Halo admin Vyrionyx,%0ASaya mau beli rank ${selectedRank}%0AUsername: ${user}%0AHarga: Rp ${selectedPrice}`;
  let wa = `https://wa.me/628139470745?text=${msg}`;

  window.open(wa, "_blank");
}
</script>

</body>
</html>
