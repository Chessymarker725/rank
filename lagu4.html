<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miku Ultimate AI Web</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

/* LOADING */
#loading{
position:fixed;width:100%;height:100%;
background:black;display:flex;justify-content:center;align-items:center;
z-index:9999;color:cyan;font-size:24px;
}

/* BACKGROUND */
body{
height:200vh;
background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.9)),url('miku.jpg');
background-size:cover;background-attachment:fixed;
color:white;overflow-x:hidden;
}

/* CURSOR */
.cursor{
position:fixed;width:15px;height:15px;
background:cyan;border-radius:50%;
pointer-events:none;box-shadow:0 0 15px cyan;z-index:999;
}

/* SIDEBAR */
.sidebar{
position:fixed;width:220px;height:100%;
background:rgba(0,0,0,0.8);padding-top:80px;
}
.sidebar a{display:block;padding:15px;color:white;text-decoration:none}
.sidebar a:hover{background:cyan;color:black}

/* MAIN */
.main{margin-left:240px;padding:20px}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
border-radius:20px;padding:20px;
backdrop-filter:blur(15px);
box-shadow:0 0 25px cyan;margin-bottom:20px;
}

/* MUSIC */
.music-item{
display:flex;gap:10px;padding:10px;margin-bottom:10px;
background:rgba(255,255,255,0.1);
border-radius:12px;cursor:pointer;
}
.music-item img{width:60px;border-radius:10px}

/* PLAYER */
.player-box{text-align:center}
.player-box img{width:150px;border-radius:15px}

/* GALLERY */
.miku-img{width:100%;margin-top:10px;border-radius:10px}

/* VISUALIZER */
#visualizer{width:100%;height:60px;background:black}

/* SAKURA */
.sakura{
position:fixed;top:-10px;width:10px;height:10px;
background:pink;border-radius:50%;
animation:fall linear infinite;
}
@keyframes fall{to{transform:translateY(100vh) rotate(360deg);}}

/* CLICK EFFECT */
.heart{
position:fixed;color:pink;font-size:20px;
animation:float 1s ease-out forwards;
}
@keyframes float{
to{transform:translateY(-50px);opacity:0;}
}

/* CHATBOT */
#chatbox{
position:fixed;bottom:20px;right:20px;
width:250px;background:rgba(0,0,0,0.8);
border-radius:15px;padding:10px;
}
#chatlog{
height:150px;overflow:auto;font-size:12px;
}
#chatinput{
width:100%;padding:5px;margin-top:5px;
border:none;border-radius:5px;
}
</style>
</head>

<body>

<div id="loading">Loading Miku World... 💙</div>
<div class="cursor" id="cursor"></div>

<div class="sidebar">
<a href="#">Home</a>
<a href="#">Music</a>
<a href="#">Gallery</a>
</div>

<div class="main">

<div class="card">
<h2>Miku Nakano 💙</h2>
<p>三玖は最高です</p>
</div>

<!-- MUSIC -->
<div class="card">
<h2>🎧 Music</h2>

<div onclick="playSong('music.mp3','People','cover1.jpg')" class="music-item">
<img src="cover1.jpg"><div>People</div>
</div>

<div onclick="playSong('music2.mp3','Night','cover2.jpg')" class="music-item">
<img src="cover2.jpg"><div>Night</div>
</div>

<div onclick="playSong('music3.mp3','Love','cover3.jpg')" class="music-item">
<img src="cover3.jpg"><div>Love</div>
</div>

<div onclick="playSong('music4.mp3','Sky','cover4.jpg')" class="music-item">
<img src="cover4.jpg"><div>Sky</div>
</div>

<div onclick="playSong('music5.mp3','Dream','cover5.jpg')" class="music-item">
<img src="cover5.jpg"><div>Dream</div>
</div>

<div class="player-box">
<img id="cover" src="cover1.jpg">
<h3 id="title">People</h3>
<audio id="player" controls autoplay>
<source src="music.mp3">
</audio>
<canvas id="visualizer"></canvas>
</div>

</div>

<!-- GALLERY -->
<div class="card">
<h2>Miku Gallery</h2>
<img src="miku2.jpg" class="miku-img">
<img src="miku3.jpg" class="miku-img">
<img src="miku4.jpg" class="miku-img">
</div>

<footer>© 2026 Fahmi Production 💙</footer>

</div>

<!-- CHATBOT -->
<div id="chatbox">
<div id="chatlog"></div>
<input id="chatinput" placeholder="Chat sama Miku...">
</div>

<script>
/* LOADING */
setTimeout(()=>document.getElementById("loading").style.display="none",2000)

/* CURSOR */
const cursor=document.getElementById("cursor");
document.addEventListener("mousemove",e=>{
cursor.style.top=e.clientY+"px";
cursor.style.left=e.clientX+"px";
})

/* CLICK EFFECT */
document.addEventListener("click",e=>{
let h=document.createElement("div");
h.className="heart";
h.innerText="💗";
h.style.left=e.clientX+"px";
h.style.top=e.clientY+"px";
document.body.appendChild(h);
setTimeout(()=>h.remove(),1000);
})

/* MUSIC */
function playSong(song,title,cover){
const p=document.getElementById("player");
p.src=song;p.play();
document.getElementById("title").innerText=title;
document.getElementById("cover").src=cover;
}

/* VISUALIZER */
const audio=document.getElementById("player");
const canvas=document.getElementById("visualizer");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;

let audioCtx=new AudioContext();
let src=audioCtx.createMediaElementSource(audio);
let analyser=audioCtx.createAnalyser();
src.connect(analyser);analyser.connect(audioCtx.destination);

function render(){
requestAnimationFrame(render);
let data=new Uint8Array(analyser.frequencyBinCount);
analyser.getByteFrequencyData(data);
ctx.fillStyle="black";ctx.fillRect(0,0,canvas.width,60);
for(let i=0;i<100;i++){
let val=data[i];
ctx.fillStyle="cyan";
ctx.fillRect(i*5,60-val/2,3,val);
}}
render();

/* SAKURA */
for(let i=0;i<30;i++){
let s=document.createElement("div");
s.className="sakura";
s.style.left=Math.random()*100+"%";
s.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(s);
}

/* CHATBOT */
const input=document.getElementById("chatinput");
const log=document.getElementById("chatlog");

input.addEventListener("keypress",function(e){
if(e.key==="Enter"){
let user=input.value;
log.innerHTML+="<div>👤 "+user+"</div>";

let reply="...";
if(user.includes("halo")) reply="Halo juga... 💙";
else if(user.includes("cinta")) reply="Aku... mungkin juga merasakan hal yang sama 😳";
else if(user.includes("miku")) reply="Aku di sini...";
else reply="Hehe... aku tidak terlalu mengerti, tapi aku akan tetap di sini 💙";

log.innerHTML+="<div>💙 "+reply+"</div>";
input.value="";
log.scrollTop=log.scrollHeight;
}
});
</script>

</body>
</html>
